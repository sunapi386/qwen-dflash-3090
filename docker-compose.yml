services:
  qwen-dflash:
    build:
      context: .
      args:
        # RTX 3090 = 86, RTX 4090 = 89, RTX 5090 = 120
        CUDA_ARCH: 86
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # TQ3_0 KV cache (3.5 bpv) — required on 24GB cards to fit the model
      - DFLASH27B_KV_TQ3=1
    ports:
      - "8090:8080"
    volumes:
      - ./models:/app/models
    command:
      - --target
      - /app/models/Qwen3.6-27B-Q4_K_M.gguf
      - --draft
      - /app/models/draft
      - --bin
      - /app/dflash/build/test_dflash
      - --max-ctx
      # 2048 fits on 24GB with desktop apps running.
      # Bump to 4096+ if you free VRAM (close browser, Slack, etc).
      - "2048"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
